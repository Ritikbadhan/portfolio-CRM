name: Backend Build Verification

on:
  push:
    paths:
      - 'apps/api/**'
      - 'packages/**'
    branches: ['main']
  pull_request:
    paths:
      - 'apps/api/**'
      - 'packages/**'
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build API
        run: npm run build -w @portfolio/api
